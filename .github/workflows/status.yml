name: Discord Status Update

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install canvas dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --fix-missing libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run status update
        env:
          DISCORD_TOKEN:    ${{ secrets.DISCORD_TOKEN }}
          THREAD_ID:        ${{ secrets.THREAD_ID }}
          MESSAGE_ID:       ${{ secrets.MESSAGE_ID }}
          CHANNEL_ID:       ${{ secrets.CHANNEL_ID }}
          FORUM_CHANNEL_ID: ${{ secrets.FORUM_CHANNEL_ID }}
          CRONJOB_API_KEY:  ${{ secrets.CRONJOB_API_KEY }}
          CRONJOB_JOB_ID:   ${{ secrets.CRONJOB_JOB_ID }}
          SETUP_MODE:       ${{ secrets.SETUP_MODE }}
        run: node bot.js
